name: Deploy DuitKu API

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'drizzle/**'
      - '.github/workflows/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== Starting Deployment ==="
            cd /var/www/duitku-api

            echo "=== Fetching latest changes ==="
            git fetch origin

            echo "=== Current commit: $(git rev-parse HEAD) ==="
            echo "=== Target commit: $(git rev-parse origin/main) ==="

            echo "=== Resetting to origin/main (HARD RESET) ==="
            git reset --hard origin/main

            echo "=== Cleaning untracked files ==="
            git clean -fd

            echo "=== Installing dependencies ==="
            npm ci --production

            echo "=== Running database migrations ==="
            npm run db:migrate || echo "No new migrations"

            echo "=== Building project ==="
            npm run build

            echo "=== Restarting PM2 process ==="
            pm2 restart duitku-api || pm2 start npm --name "duitku-api" -- start
            pm2 save

            echo "=== Waiting for application to start ==="
            sleep 5

            echo "=== Checking health ==="
            curl -f http://localhost:3010/health || echo "Health check warning"

            echo "=== Deployment completed ==="
            echo "=== Current commit: $(git rev-parse HEAD) ==="

      - name: Notify Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✓ Deployment successful"
          else
            echo "✗ Deployment failed"
          fi
